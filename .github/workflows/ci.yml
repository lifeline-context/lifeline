name: CI

# Runs the suite on every push/PR — catches drift (docs/tests/code) automatically.
# The live tests (TestSupabaseLive) skip unless SUPABASE_* secrets are configured on the repo
# (Settings → Secrets and variables → Actions). With them set, the live contract runs in CI too;
# without them (incl. fork PRs, where secrets are unavailable), they skip — never fail.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (cloud + dev/pytest extras)
        run: pip install -e ".[cloud,dev]"
      - name: Tests (live ones run only when SUPABASE_* secrets are present)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_TOKEN: ${{ secrets.SUPABASE_TOKEN }}
        run: python -m pytest -q
      - name: Line integrity (rebuild from the view and verify the real chain)
        run: |
          python -m lifeline migrate --from LIFELINE.md
          python -m lifeline verify
