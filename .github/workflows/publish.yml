name: Publish to PyPI

# Publica no PyPI via Trusted Publishing (OIDC) — SEM token/segredo.
# Dispara ao publicar um GitHub Release (ou manualmente em Actions → Run workflow).
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi          # deve casar com o "Nome do ambiente" do Trusted Publisher
    permissions:
      id-token: write          # obrigatório p/ o OIDC do Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build (sdist + wheel)
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
