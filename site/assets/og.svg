<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="Inter, sans-serif">
  <rect width="1200" height="630" fill="#08090a"/>
  <rect width="1200" height="630" fill="url(#wash)"/>
  <!-- lifeline thread -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#1c1f26" stroke-width="2"/>
  <line x1="0" y1="315" x2="760" y2="315" stroke="url(#thread)" stroke-width="3"/>
  <circle cx="300" cy="315" r="6" fill="#08090a" stroke="#41d6c3" stroke-width="2.5"/>
  <circle cx="540" cy="315" r="6" fill="#08090a" stroke="#7c89ff" stroke-width="2.5"/>
  <circle cx="760" cy="315" r="8" fill="#08090a" stroke="#7c89ff" stroke-width="3"/>
  <!-- brand -->
  <circle cx="92" cy="98" r="7" fill="#7c89ff"/>
  <text x="112" y="106" fill="#f7f8f8" font-size="30" font-weight="600">Lifeline</text>
  <text x="92" y="250" fill="#f7f8f8" font-size="92" font-weight="600" letter-spacing="-3">Git for reasoning.</text>
  <text x="92" y="430" fill="#b7bdc6" font-size="34" font-weight="400">An append-only, content-addressed ledger of a project's <tspan fill="#7c89ff">why</tspan>.</text>
  <text x="92" y="478" fill="#b7bdc6" font-size="34" font-weight="400">Any AI connects over MCP and already knows.</text>
  <text x="92" y="566" fill="#5b606b" font-size="24" font-weight="500" font-family="JetBrains Mono, monospace">pip install lifeline-context  ·  Time-to-Context → 0</text>
  <defs>
    <linearGradient id="thread" x1="0" y1="0" x2="760" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#41d6c3"/><stop offset="1" stop-color="#7c89ff"/>
    </linearGradient>
    <radialGradient id="wash" cx="20%" cy="35%" r="60%">
      <stop stop-color="#7c89ff" stop-opacity="0.12"/><stop offset="1" stop-color="#08090a" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
